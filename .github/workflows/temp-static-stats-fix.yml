name: One-time static homepage stats fix

on:
  push:
    branches:
      - fix/static-homepage-stats
    paths:
      - .github/workflows/temp-static-stats-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/static-homepage-stats
          fetch-depth: 0

      - name: Replace zero-value fallback text
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '<span class="stat-num" data-count="10" data-suffix="+">0+</span>': '<span class="stat-num" data-count="10" data-suffix="+">10+</span>',
              '<span class="stat-num" data-count="3" data-suffix="">0</span>': '<span class="stat-num" data-count="3" data-suffix="">3</span>',
              '<span class="stat-num" data-count="100" data-suffix="%">0%</span>': '<span class="stat-num" data-count="100" data-suffix="%">100%</span>',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one occurrence of {old!r}; found {count}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate static and animated values
        run: |
          grep -F 'data-count="10" data-suffix="+">10+</span>' index.html
          grep -F 'data-count="3" data-suffix="">3</span>' index.html
          grep -F 'data-count="100" data-suffix="%">100%</span>' index.html
          grep -F "el.textContent = val + suffix" index.html
          ! grep -F 'data-count="10" data-suffix="+">0+</span>' index.html
          ! grep -F 'data-count="100" data-suffix="%">0%</span>' index.html

      - name: Commit the correction and remove this temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-static-stats-fix.yml
          git add index.html
          git commit -m "Render accurate homepage stats without JavaScript"
          git push origin HEAD:fix/static-homepage-stats
