name: Notify IndexNow

on:
  push:
    branches:
      - main
    paths:
      - "**.html"
      - "**.xml"
      - "robots.txt"
      - "llms.txt"
      - "entity.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: indexnow-main
  cancel-in-progress: true

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Build IndexNow payload
        env:
          INDEXNOW_KEY: 168b5dc145b34850011606e2b2c3cc1b
        run: |
          python3 - <<'PY'
          import json
          import os
          import xml.etree.ElementTree as ET

          host = "coverandprotect.ca"
          key = os.environ["INDEXNOW_KEY"]
          namespace = {"sm": "http://www.sitemaps.org/schemas/sitemap/0.9"}
          root = ET.parse("sitemap.xml").getroot()
          urls = [
              node.text.strip()
              for node in root.findall("sm:url/sm:loc", namespace)
              if node.text and node.text.strip()
          ]
          urls.extend([
              f"https://{host}/llms.txt",
              f"https://{host}/entity.json",
              f"https://{host}/feed.xml",
          ])
          urls = list(dict.fromkeys(urls))

          payload = {
              "host": host,
              "key": key,
              "keyLocation": f"https://{host}/{key}.txt",
              "urlList": urls,
          }
          with open("indexnow-payload.json", "w", encoding="utf-8") as handle:
              json.dump(payload, handle, ensure_ascii=False)
          print(f"Prepared {len(urls)} URLs for IndexNow")
          PY

      - name: Submit URLs to IndexNow
        run: |
          # IndexNow is a best-effort SEO ping. Submit the payload and surface
          # the response, but don't fail the job (and email the owner) when
          # IndexNow rejects the request or is unreachable — a rejected ping does
          # not affect the published site. Only genuine problems in the build
          # step above should fail this workflow.
          http_code="$(curl --silent --show-error --fail-with-body \
            --output indexnow-response.txt --write-out '%{http_code}' \
            --retry 3 --retry-delay 5 \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data-binary @indexnow-payload.json \
            https://api.indexnow.org/indexnow)" || true
          [ -n "$http_code" ] || http_code="000"
          body="$(cat indexnow-response.txt 2>/dev/null || true)"

          echo "IndexNow HTTP status: $http_code"
          echo "IndexNow response body: $body"
          {
            echo "### IndexNow submission"
            echo ""
            echo "- HTTP status: \`$http_code\`"
            echo "- Response: \`${body:-<empty>}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          case "$http_code" in
            200|202)
              echo "IndexNow accepted the submission."
              ;;
            000)
              echo "::warning title=IndexNow unreachable::Could not reach api.indexnow.org after retries; the ping was skipped. This does not affect the published site."
              ;;
            *)
              echo "::warning title=IndexNow rejected submission::IndexNow returned HTTP $http_code. This is common for a domain Bing has not yet verified/trusted — verify coverandprotect.ca in Bing Webmaster Tools to restore acceptance. Body: $body"
              ;;
          esac
